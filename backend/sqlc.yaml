# sqlc configuration for Red Team Scanner
# Generates type-safe Go code from SQL queries

version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/store/sqlc/queries.sql"
    schema: "./migrations/001_initial_schema.sql"
    gen:
      go:
        package: "db"
        out: "./internal/store/sqlc/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_prepared_queries: true
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_exported_queries: false
        emit_result_struct_pointers: false
        emit_params_struct_pointers: false
        emit_methods_with_db_argument: false
        emit_enum_valid_method: true
        emit_all_enum_values: true
        json_tags_case_style: "snake"
        output_db_file_name: "db.go"
        output_models_file_name: "models.go"
        output_querier_file_name: "querier.go"
        overrides:
          # UUID handling
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          # TIMESTAMPTZ handling
          - db_type: "timestamptz"
            go_type: "time.Time"
          # JSONB handling
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          # DECIMAL handling for CVSS scores
          - db_type: "decimal"
            go_type:
              import: "github.com/jackc/pgx/v5/pgtype"
              type: "Numeric"
          # TEXT arrays
          - db_type: "text[]"
            go_type:
              import: "github.com/jackc/pgx/v5/pgtype"
              type: "Array[string]"
